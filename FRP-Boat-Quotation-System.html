<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBSC — FRP Boat Quotation System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#0a1e33;
  --navy-900:#0d2740;
  --navy-800:#13315c;
  --navy-700:#1c4470;
  --steel-400:#7891a8;
  --steel-200:#c7d3dd;
  --paper:#f7f4ec;
  --paper-line:#e3ddca;
  --teal:#0f8b8d;
  --teal-dark:#0a6567;
  --amber:#d99a2b;
  --amber-dark:#b87e1a;
  --ink:#132433;
  --ink-soft:#4a5c6b;
  --danger:#b3452f;
  --good:#2f7d4f;
  --radius:3px;
  --shadow:0 1px 2px rgba(10,30,51,.08), 0 4px 14px rgba(10,30,51,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:var(--paper);
  font-size:14px;
  line-height:1.5;
}
h1,h2,h3,h4{font-family:'Big Shoulders Display',sans-serif;font-weight:700;letter-spacing:.02em;margin:0;text-transform:uppercase;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:13px;}
a{color:inherit;}

/* ---------- Shell ---------- */
#app{display:flex;min-height:100vh;}
.sidebar{
  width:220px;flex:none;background:var(--navy-950);color:var(--steel-200);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 24px);
}
.brand{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.brand .mark{display:flex;align-items:center;gap:9px;}
.brand .mark svg{flex:none;}
.brand h1{font-size:22px;color:#fff;line-height:1;}
.brand .sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel-400);margin-top:4px;}
.nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);
  color:var(--steel-200);font-size:12.5px;letter-spacing:.03em;text-transform:uppercase;font-weight:600;
  cursor:pointer;margin-bottom:2px;border:1px solid transparent;
}
.nav-item .num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--steel-400);width:16px;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:var(--navy-800);color:#fff;border-color:rgba(255,255,255,.08);}
.nav-item.active .num{color:var(--amber);}
.sidebar-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:var(--steel-400);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:56px;flex:none;background:#fff;border-bottom:1px solid var(--paper-line);
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:20;
}
.topbar .title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
.topbar .actions{display:flex;gap:8px;}
.content{padding:24px;flex:1;}

/* ---------- Buttons ---------- */
.btn{
  border:1px solid var(--navy-800);background:#fff;color:var(--navy-800);
  padding:8px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--navy-900);color:#fff;}
.btn-primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);border-color:var(--teal-dark);}
.btn-amber{background:var(--amber);border-color:var(--amber-dark);color:#fff;}
.btn-amber:hover{background:var(--amber-dark);}
.btn-ghost{border-color:transparent;background:transparent;color:var(--ink-soft);}
.btn-ghost:hover{background:var(--paper-line);color:var(--ink);}
.btn-danger{border-color:var(--danger);color:var(--danger);background:#fff;}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:5px 10px;font-size:10.5px;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}

/* ---------- Cards / layout ---------- */
.card{background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-head{padding:14px 18px;border-bottom:1px solid var(--paper-line);display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:15px;color:var(--navy-900);}
.card-body{padding:18px;}
.grid{display:grid;gap:16px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 1fr;}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr;}}

.field{margin-bottom:12px;}
.field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;border:1px solid #d7d0bc;border-radius:var(--radius);background:#fffef9;color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal);}
.field .hint{font-size:10.5px;color:var(--steel-400);margin-top:3px;}
.field-inline{display:flex;align-items:center;gap:8px;}

/* ---------- Dashboard ---------- */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--navy-950);color:#fff;border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;right:-10px;bottom:-10px;width:70px;height:70px;border:1px solid rgba(255,255,255,.08);border-radius:50%;}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--steel-400);margin-bottom:6px;}
.stat .val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;}
.stat.amber{background:var(--amber-dark);}
.stat.teal{background:var(--teal-dark);}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);padding:8px 10px;border-bottom:2px solid var(--navy-800);}
td{padding:8px 10px;border-bottom:1px solid var(--paper-line);vertical-align:middle;}
tr:hover td{background:#fbfaf5;}
.tbl-input{width:100%;border:1px solid transparent;background:transparent;padding:4px 6px;border-radius:2px;}
.tbl-input:hover,.tbl-input:focus{border-color:#d7d0bc;background:#fffef9;}
.tbl-input.num{text-align:right;font-family:'IBM Plex Mono',monospace;}
.right{text-align:right;}
.center{text-align:center;}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.badge.draft{background:#eee6c8;color:#8a6d10;}
.badge.sent{background:#d6e6f5;color:#1c5583;}
.badge.approved{background:#d8ecdd;color:#1f6e39;}

/* ---------- Tabs (editor) ---------- */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--paper-line);margin-bottom:18px;flex-wrap:wrap;background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:4px;box-shadow:var(--shadow);}
.tab{padding:9px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--ink-soft);border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:6px;}
.tab .n{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--steel-400);}
.tab:hover{background:var(--paper);}
.tab.active{background:var(--navy-900);color:#fff;}
.tab.active .n{color:var(--amber);}
.tabpane{display:none;}
.tabpane.active{display:block;animation:fade .15s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ---------- Editor layout: form + live summary ---------- */
.editor-grid{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
@media(max-width:1100px){.editor-grid{grid-template-columns:1fr;}}
.summary-panel{position:sticky;top:72px;}
.sum-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--paper-line);font-size:12px;}
.sum-row .k{color:var(--ink-soft);}
.sum-row .v{font-family:'IBM Plex Mono',monospace;font-weight:600;}
.sum-total{display:flex;justify-content:space-between;padding:14px 0 4px;margin-top:6px;border-top:2px solid var(--navy-800);}
.sum-total .k{font-family:'Big Shoulders Display',sans-serif;font-size:15px;text-transform:uppercase;}
.sum-total .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;color:var(--teal-dark);}

/* Spec plate signature element */
.spec-plate{
  background:var(--navy-950);color:var(--steel-200);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;
  background-image: linear-gradient(135deg, rgba(15,139,141,.15), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 1px, transparent 1px 22px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 22px);
  border:1px solid rgba(255,255,255,.08);
}
.spec-plate .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px 22px;}
.spec-plate .cell{min-width:80px;}
.spec-plate .cell .l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--steel-400);}
.spec-plate .cell .v{font-family:'IBM Plex Mono',monospace;font-size:15px;color:#fff;}

/* Accessories item rows */
.acc-cat{margin-bottom:16px;}
.acc-cat-head{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid var(--navy-800);margin-bottom:4px;}
.acc-cat-head h4{font-size:12.5px;color:var(--navy-900);}

/* ---------- Quotation document / print ---------- */
.doc-wrap{background:#e9e5d8;padding:30px;border-radius:var(--radius);}
.doc{background:#fff;max-width:800px;margin:0 auto;padding:48px 52px;box-shadow:0 2px 20px rgba(0,0,0,.15);color:#1a1a1a;font-size:12.5px;}
.doc h1,.doc h2,.doc h3{font-family:'Big Shoulders Display',sans-serif;}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy-900);padding-bottom:14px;margin-bottom:18px;}
.doc-header .co h2{font-size:24px;color:var(--navy-900);}
.doc-header .co .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
.doc-header .meta{text-align:right;font-size:11px;}
.doc-header .meta .ref{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--navy-900);}
.doc-section-title{font-size:13px;background:var(--navy-900);color:#fff;padding:5px 10px;margin:20px 0 8px;letter-spacing:.05em;}
.doc table{font-size:11.5px;}
.doc th{border-bottom:1px solid #999;background:#f2f0e8;}
.doc td{border-bottom:1px solid #ddd;}
.doc .grand{font-weight:700;font-size:14px;background:#fbf3df;}
.doc-terms{font-size:10.5px;color:#333;}
.doc-terms ol{padding-left:16px;}
.doc-sign{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:34px;font-size:11px;text-align:center;}
.doc-sign .ln{border-top:1px solid #333;margin-top:36px;padding-top:6px;}
@media print{
  body *{visibility:hidden;}
  .doc-wrap,.doc-wrap *{visibility:visible;}
  .doc-wrap{position:absolute;left:0;top:0;padding:0;background:#fff;width:100%;}
  .doc{box-shadow:none;margin:0;max-width:100%;}
  .no-print{display:none!important;}
}

/* empty state */
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.empty svg{opacity:.35;margin-bottom:10px;}

/* toast */
#toast{position:fixed;bottom:20px;right:20px;background:var(--navy-950);color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:12.5px;box-shadow:var(--shadow);z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

.section-lead{font-size:11.5px;color:var(--ink-soft);margin-bottom:14px;max-width:560px;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.search{position:relative;}
.search input{padding-left:30px;}
.search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.4;}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">
        <svg width="26" height="26" viewBox="0 0 26 26"><path d="M3 17c2 3 5 3 7 1 2 2 5 2 7 0 2 2 5 2 7-1" stroke="#0f8b8d" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M6 14l2-9h9l2 9" stroke="#c7d3dd" stroke-width="1.6" fill="none" stroke-linejoin="round"/><line x1="13" y1="5" x2="13" y2="2" stroke="#d99a2b" stroke-width="1.6"/></svg>
        <h1>TBSC</h1>
      </div>
      <div class="sub">FRP Quotation System</div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="sidebar-foot">v1.0 · Local storage build</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="title" id="topbarTitle">Dashboard</div>
      <div class="actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ============================================================
   STATE & PERSISTENCE
   ============================================================ */
const DB_KEYS = { quotes:'frp_quotations', customers:'frp_customers', pricing:'frp_pricing_db', templates:'frp_boat_templates' };

function load(key, fallback){ try{ const v = localStorage.getItem(key); return v? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function fmt(n){ n = Number(n)||0; return '₱'+n.toLocaleString('en-PH',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtNum(n,d=2){ n=Number(n)||0; return n.toLocaleString('en-PH',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2200); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

/* ---------- default pricing database ---------- */
const DEFAULT_PRICING = {
  fiberglassPerKg: 210,
  resinPerLiter: 175,
  resinDensity: 1.1,
  resinRatio: 1.8,
  gelcoatPerKg: 260,
  gelcoatCoverage: 0.6,
  corePerSqm: 850,
  primerPerLiter: 320,
  primerCoverage: 6,
  paintPerLiter: 480,
  paintCoverage: 8,
  laborRates: { fabrication:180, fiberglass:190, painting:160, electrical:200, assembly:170, testing:210 },
  overheadPct: 12,
  contingencyPct: 5,
  marginPct: 18,
  dailyRate: 3500,
  standardDurationDays: 180,
  rushFeePct: 15,
  engineDb: [
    {id:uid('eng'), name:'Isuzu 340HP UM6SD1TCX + Dong-I DMT140H', hp:340, price:3048856},
    {id:uid('eng'), name:'Yanmar 6LY440 (440HP)', hp:440, price:3650000},
    {id:uid('eng'), name:'Cummins QSB6.7 (450HP)', hp:450, price:3820000},
  ],
  accessoryCatalog: [
    {cat:'Hull & Deck Accessories', name:'Stainless Bollard (pair)', unitPrice:8500},
    {cat:'Hull & Deck Accessories', name:'Stainless Cleat', unitPrice:1800},
    {cat:'Hull & Deck Accessories', name:'Towing Bitt', unitPrice:6200},
    {cat:'Hull & Deck Accessories', name:'Rub Rail (per ft)', unitPrice:420},
    {cat:'Hull & Deck Accessories', name:'SS#316 Grab Handle', unitPrice:2600},
    {cat:'Electrical System', name:'12V Panel Switch Board', unitPrice:14500},
    {cat:'Electrical System', name:'Dome Light', unitPrice:950},
    {cat:'Electrical System', name:'Bilge Pump w/ Auto Float', unitPrice:4200},
    {cat:'Electrical System', name:'Battery (Marine Deep Cycle)', unitPrice:9800},
    {cat:'Navigational Equipment', name:'GPS Chartplotter 10in', unitPrice:95000},
    {cat:'Navigational Equipment', name:'Marine Radar 36NM', unitPrice:185000},
    {cat:'Anchor & Docking', name:'Anchor Set w/ Chain & Rope', unitPrice:22000},
    {cat:'Anchor & Docking', name:'Fender', unitPrice:1600},
    {cat:'SOLAS Safety Equipment', name:'Life Vest', unitPrice:850},
    {cat:'SOLAS Safety Equipment', name:'Ring Buoy', unitPrice:2400},
    {cat:'SOLAS Safety Equipment', name:'Fire Extinguisher', unitPrice:1850},
  ],
  structuralCatalog: [
    {cat:'Stiffeners & Framing', name:'Longitudinal Stiffener (glassed-in)', unit:'linear m', unitPrice:1450},
    {cat:'Stiffeners & Framing', name:'Transverse Frame / Stringer', unit:'linear m', unitPrice:1650},
    {cat:'Stiffeners & Framing', name:'Hat-Section Stringer (foam-cored)', unit:'linear m', unitPrice:1950},
    {cat:'Bulkheads', name:'Plywood Bulkhead (marine ply, glassed both sides)', unit:'sqm', unitPrice:3800},
    {cat:'Bulkheads', name:'FRP Sandwich Bulkhead (foam core)', unit:'sqm', unitPrice:4600},
    {cat:'Bulkheads', name:'Collision / Watertight Bulkhead', unit:'sqm', unitPrice:5200},
    {cat:'Foam & Core Materials', name:'Urethane Pour Foam (flotation/buoyancy)', unit:'cu.ft', unitPrice:850},
    {cat:'Foam & Core Materials', name:'PVC Foam Core Board (Divinycell-type)', unit:'sqm', unitPrice:2600},
    {cat:'Foam & Core Materials', name:'End-Grain Balsa Core', unit:'sqm', unitPrice:2200},
    {cat:'Foam & Core Materials', name:'Marine Plywood Coring (per sheet, 4x8ft)', unit:'sheet', unitPrice:3200},
    {cat:'Other Structural Materials', name:'Chopped Strand Mat (450gsm, per roll)', unit:'roll', unitPrice:4800},
    {cat:'Other Structural Materials', name:'Woven Roving Reinforcement (per roll)', unit:'roll', unitPrice:6200},
    {cat:'Other Structural Materials', name:'Structural Adhesive / Epoxy Filler', unit:'kg', unitPrice:650},
    {cat:'Other Structural Materials', name:'Deck Beam / Carlin (FRP)', unit:'linear m', unitPrice:1800},
  ]
};

const DEFAULT_TEMPLATES = [
  { id:uid('tpl'), name:"64' Passenger Boat — 80 Pax (Inboard)", boatType:'Passenger Boat', loa:64, beam:14, depth:6, numHulls:1,
    hullAreaOverride:null, layers:3, glassPerLayer:0.6,
    paintArea:null, coats:3,
    accessories: [
      {cat:'Hull & Deck Accessories', name:'Stainless Bollard', qty:2, unitPrice:8500, markup:15},
      {cat:'Hull & Deck Accessories', name:'Stainless Cleat', qty:6, unitPrice:1800, markup:15},
      {cat:'Hull & Deck Accessories', name:'Towing Bitt', qty:2, unitPrice:6200, markup:15},
      {cat:'Electrical System', name:'Dome Light', qty:16, unitPrice:950, markup:15},
      {cat:'Electrical System', name:'Bilge Pump w/ Auto Float', qty:1, unitPrice:4200, markup:15},
      {cat:'Navigational Equipment', name:'GPS Chartplotter 10in', qty:1, unitPrice:95000, markup:10},
      {cat:'Navigational Equipment', name:'Marine Radar 36NM', qty:1, unitPrice:185000, markup:10},
      {cat:'Anchor & Docking', name:'Anchor Set w/ Chain & Rope', qty:1, unitPrice:22000, markup:15},
      {cat:'SOLAS Safety Equipment', name:'Life Vest', qty:84, unitPrice:850, markup:15},
      {cat:'SOLAS Safety Equipment', name:'Fire Extinguisher', qty:4, unitPrice:1850, markup:15},
    ],
    engine: { model:'Isuzu 340HP UM6SD1TCX + Dong-I DMT140H', hp:340, qty:2, unitPrice:3048856, installation:180000 },
    labor: { fabrication:900, fiberglass:600, painting:260, electrical:320, assembly:400, testing:120 }
  }
];

let PRICING = load(DB_KEYS.pricing, null) || JSON.parse(JSON.stringify(DEFAULT_PRICING));
if(!PRICING.structuralCatalog) PRICING.structuralCatalog = JSON.parse(JSON.stringify(DEFAULT_PRICING.structuralCatalog));
if(PRICING.dailyRate===undefined) PRICING.dailyRate = DEFAULT_PRICING.dailyRate;
if(PRICING.standardDurationDays===undefined) PRICING.standardDurationDays = DEFAULT_PRICING.standardDurationDays;
if(PRICING.rushFeePct===undefined) PRICING.rushFeePct = DEFAULT_PRICING.rushFeePct;
let CUSTOMERS = load(DB_KEYS.customers, []);
let QUOTES = load(DB_KEYS.quotes, []);
let TEMPLATES = load(DB_KEYS.templates, null) || DEFAULT_TEMPLATES;
if(!load(DB_KEYS.templates,null)) save(DB_KEYS.templates, TEMPLATES);
if(!load(DB_KEYS.pricing,null)) save(DB_KEYS.pricing, PRICING);

const COMPANY = { name:'The Boat Shop Corporation', tagline:'Fiberglass Boat Builders', email:'info@boatshopphilippines.com', address:'Philippines' };

/* ============================================================
   NEW QUOTATION FACTORY
   ============================================================ */
function blankQuote(){
  return {
    id: uid('q'),
    refNo: nextRefNo(),
    status: 'draft',
    date: todayISO(),
    validityDays: 30,
    customerId: null,
    customerSnap: { name:'', email:'', address:'', contact:'' },
    project: { title:'', notes:'' },
    hull: { boatType:'Passenger Boat', loa:0, beam:0, depth:0, numHulls:1, hullAreaOverride:null, layers:3, glassPerLayer:0.6, coreArea:0, coreEnabled:false },
    structural: { items:[] },
    paint: { areaOverride:null, coats:3, paintType:'Marine Polyurethane Topcoat' },
    accessories: [],

function nextRefNo(){

/* ============================================================
   CALCULATION ENGINE
   ============================================================ */
const FT2M = 0.3048;
function hullAreaEstimate(h){
  if(h.hullAreaOverride!=null && h.hullAreaOverride!=='') return Number(h.hullAreaOverride);
  const loaM = h.loa*FT2M, beamM = h.beam*FT2M;
  const kFactor = { 'Monohull':1.35, 'Catamaran':1.15, 'Passenger Boat':1.5, 'Fishing Boat':1.4, 'Patrol Boat':1.45, 'Pontoon':1.2 }[h.boatType] || 1.4;
  const perHull = loaM*beamM*kFactor;
  return +(perHull * (h.numHulls||1)).toFixed(2);
}
function computeHull(q){
  const h = q.hull, r = q.rates;
  const area = hullAreaEstimate(h);
  const glassWeight = area * h.layers * h.glassPerLayer;
  const resinWeight = glassWeight * r.resinRatio;
  const resinLiters = resinWeight / r.resinDensity;
  const gelcoatWeight = area * r.gelcoatCoverage;
  const coreCost = h.coreEnabled ? (Number(h.coreArea)||0) * r.corePerSqm : 0;
  const glassCost = glassWeight * r.fiberglassPerKg;
  const resinCost = resinLiters * r.resinPerLiter;
  const gelcoatCost = gelcoatWeight * r.gelcoatPerKg;
  const total = glassCost + resinCost + gelcoatCost + coreCost;
  return { area, glassWeight, resinWeight, resinLiters, gelcoatWeight, glassCost, resinCost, gelcoatCost, coreCost, total };
}
function computePaint(q, hullCalc){
  const p = q.paint, r = q.rates;
  const area = (p.areaOverride!=null && p.areaOverride!=='') ? Number(p.areaOverride) : hullCalc.area;
  const primerLiters = area / r.primerCoverage;
  const paintLiters = (area / r.paintCoverage) * (p.coats||1);
  const primerCost = primerLiters * r.primerPerLiter;
  const paintCost = paintLiters * r.paintPerLiter;
  const total = primerCost + paintCost;
  return { area, primerLiters, paintLiters, primerCost, paintCost, total };
}
function computeStructural(q){
  const rows = (q.structural.items||[]).map(a=>{
    const total = (Number(a.qty)||0) * (Number(a.unitPrice)||0);
    return {...a, total};
  });
  const total = rows.reduce((s,r)=>s+r.total,0);
  return { rows, total };
}
function computeAccessories(q){
  const rows = q.accessories.map(a=>{
    const base = (Number(a.qty)||0) * (Number(a.unitPrice)||0);
    const total = base * (1 + (Number(a.markup)||0)/100);
    return {...a, base, total};
  });
  const total = rows.reduce((s,r)=>s+r.total,0);
  return { rows, total };
}
function computeEngine(q){
  const e = q.engine;
  const unitsCost = (Number(e.qty)||0) * (Number(e.unitPrice)||0);
  const total = unitsCost + (Number(e.installation)||0);
  return { unitsCost, total };
}
function computeLabor(q){
  const l = q.labor, rates = q.rates.laborRates;
  const rows = Object.keys(l).map(k=>({
    key:k, hours:Number(l[k])||0, rate: Number(rates[k])||0, cost: (Number(l[k])||0)*(Number(rates[k])||0)
  }));
  const total = rows.reduce((s,r)=>s+r.cost,0);
  return { rows, total };
}
function computeAll(q){
  const hull = computeHull(q);
  const paint = computePaint(q, hull);
  const structural = computeStructural(q);
  const acc = computeAccessories(q);
  const eng = computeEngine(q);
  const labor = computeLabor(q);
  const materialCost = hull.total + paint.total + structural.total;
  const equipmentCost = acc.total + eng.total;
  const laborCost = labor.total;
  const base = materialCost + equipmentCost + laborCost;
  const overheadCost = base * (Number(q.rates.overheadPct)||0)/100;
  const contingencyCost = base * (Number(q.rates.contingencyPct)||0)/100;
  const marginCost = base * (Number(q.rates.marginPct)||0)/100;
  const sch = q.schedule || { startDate: todayISO(), standardDays: q.rates.standardDurationDays||180, requestedDays: q.rates.standardDurationDays||180 };
  const standardDays = Number(sch.standardDays)||0;
  const requestedDays = Number(sch.requestedDays)||standardDays;
  const durationCost = requestedDays * (Number(q.rates.dailyRate)||0);
  const isRush = standardDays>0 && requestedDays < standardDays;
  const rushFee = isRush ? base * (Number(q.rates.rushFeePct)||0)/100 : 0;
  const deliveryDate = sch.startDate ? new Date(new Date(sch.startDate).getTime() + requestedDays*86400000) : null;
  const finalTotal = materialCost + laborCost + equipmentCost + overheadCost + contingencyCost + marginCost + durationCost + rushFee;
  return { hull, paint, structural, acc, eng, labor, materialCost, equipmentCost, laborCost, overheadCost, contingencyCost, marginCost, base, standardDays, requestedDays, durationCost, isRush, rushFee, deliveryDate, finalTotal };
}

function renderQuotesList(content, actions){
  actions.innerHTML = `<button class="btn btn-primary" id="btnNewQ2">${icon('plus')} New Quotation</button>`;
  content.innerHTML = `
    <div class="pill-row">
      <div class="search"><span>${icon('search')}</span><input id="qSearch" placeholder="Search by ref no., client, boat type…" style="width:280px;padding:8px 10px 8px 30px;border:1px solid #d7d0bc;border-radius:3px;"></div>
      <select id="qFilterStatus" style="padding:8px 10px;border:1px solid #d7d0bc;border-radius:3px;">
        <option value="">All statuses</option>
        <option value="draft">Draft</option>
        <option value="sent">Sent</option>
        <option value="approved">Approved</option>
      </select>
    </div>
    <div class="card"><div class="card-body" style="padding:0;" id="qTableWrap"></div></div>
  `;
  document.getElementById('btnNewQ2').onclick = ()=>openEditor(null);
  const wrap = document.getElementById('qTableWrap');
  function draw(){
    const term = document.getElementById('qSearch').value.toLowerCase();
    const st = document.getElementById('qFilterStatus').value;
    let rows = [...QUOTES].sort((a,b)=>b.updatedAt-a.updatedAt).filter(q=>{
      const hay = (q.refNo+' '+q.customerSnap.name+' '+q.hull.boatType).toLowerCase();
      return hay.includes(term) && (!st || q.status===st);
    });
    wrap.innerHTML = rows.length? `<table><thead><tr><th>Ref No.</th><th>Date</th><th>Client</th><th>Boat</th><th class="right">Total</th><th>Status</th><th></th></tr></thead><tbody>
      ${rows.map(q=>{
        const t = computeAll(q).finalTotal;
        return `<tr>
          <td class="mono">${q.refNo}</td>
          <td class="mono">${q.date}</td>
          <td>${q.customerSnap.name||'—'}</td>
          <td>${q.hull.boatType} · ${q.hull.loa||0}ft</td>
          <td class="right mono">${fmt(t)}</td>
          <td><span class="badge ${q.status}">${q.status}</span></td>
          <td class="right" style="white-space:nowrap;">
            <span class="btn btn-ghost btn-sm" data-open="${q.id}">Open</span>
            <span class="btn btn-ghost btn-sm" data-dup="${q.id}">Duplicate</span>
            <span class="btn btn-ghost btn-sm" data-del="${q.id}" style="color:var(--danger);">Delete</span>
          </td>
        </tr>`;
      }).join('')}
    </tbody></table>` : `<div class="empty">No quotations match your search.</div>`;
    wrap.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openEditor(b.dataset.open));
    wrap.querySelectorAll('[data-dup]').forEach(b=>b.onclick=()=>{
      const src = QUOTES.find(x=>x.id===b.dataset.dup);
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = uid('q'); copy.refNo = nextRefNo()+'A'; copy.status='draft'; copy.date=todayISO();
      copy.createdAt = Date.now(); copy.updatedAt = Date.now();
      QUOTES.push(copy); save(DB_KEYS.quotes, QUOTES); toast('Quotation duplicated'); draw();
    });
    wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
      if(confirm('Delete this quotation? This cannot be undone.')){
        QUOTES = QUOTES.filter(x=>x.id!==b.dataset.del); save(DB_KEYS.quotes, QUOTES); toast('Quotation deleted'); draw();
      }
    });
  }
  document.getElementById('qSearch').oninput = draw;
  document.getElementById('qFilterStatus').onchange = draw;
  draw();
}

      <tr>

        <td><input class="tbl-input structcat-f" data-idx="${idx}" data-f="name" value="${esc(a.name)}"></td>

  drawEngines(); drawAcc(); drawStructCat();

    document.querySelectorAll('.pf').forEach(i=>{
      const k = i.dataset.key, v = Number(i.value);
      if(k.startsWith('labor_')) r.laborRates[k.replace('labor_','')] = v;

    });
    save(DB_KEYS.pricing, PRICING); toast('Pricing database saved');
  };

    if(confirm('Reset all pricing to factory defaults?')){ PRICING = JSON.parse(JSON.stringify(DEFAULT_PRICING)); save(DB_KEYS.pricing,PRICING); renderPricing(content,actions); }
  };

function openEditor(quoteId, templateId){
  CURRENT.view = 'editor'; CURRENT.tab='client';
  if(quoteId){ CURRENT.quoteId = quoteId; }
  else {
    const q = blankQuote();
    if(templateId){
      const t = TEMPLATES.find(x=>x.id===templateId);
      if(t){
        q.hull = { boatType:t.boatType, loa:t.loa, beam:t.beam, depth:t.depth, numHulls:t.numHulls||1, hullAreaOverride:t.hullAreaOverride, layers:t.layers, glassPerLayer:t.glassPerLayer, coreArea:0, coreEnabled:false };
        q.paint = { areaOverride:t.paintArea, coats:t.coats, paintType:'Marine Polyurethane Topcoat' };
        q.accessories = (t.accessories||[]).map(a=>({...a, id:uid('ai')}));
        q.engine = {...t.engine};
        q.labor = {...t.labor};
        q.project.title = t.name;
      }
    }
    QUOTES.push(q); save(DB_KEYS.quotes, QUOTES);
    CURRENT.quoteId = q.id;
  }
  renderAll();
}
function getCurrentQuote(){ return QUOTES.find(q=>q.id===CURRENT.quoteId); }
function ensureQuoteDefaults(q){
  if(!q.structural) q.structural = { items:[] };
  if(!q.schedule) q.schedule = { startDate: q.date||todayISO(), standardDays: PRICING.standardDurationDays, requestedDays: PRICING.standardDurationDays };
  if(q.rates.dailyRate===undefined) q.rates.dailyRate = PRICING.dailyRate;
  if(q.rates.standardDurationDays===undefined) q.rates.standardDurationDays = PRICING.standardDurationDays;
  if(q.rates.rushFeePct===undefined) q.rates.rushFeePct = PRICING.rushFeePct;
  if(!q.marina){
    q.marina = {
      items: [
        {name:"MARINA Construction Permit (Certificate of Construction)", responsibility:'Company', remarks:'Filed prior to keel-laying'},
        {name:"Certificate of Vessel Registry (COR)", responsibility:'Customer', remarks:''},
        {name:"Coastwise License / Certificate of Public Convenience", responsibility:'Customer', remarks:'If for commercial operation'},
        {name:"Load Line Certificate", responsibility:'Customer', remarks:''},
        {name:"Cargo Ship Safety Equipment Certificate", responsibility:'Customer', remarks:''},
        {name:"Certificate of Inspection (COI)", responsibility:'Customer', remarks:'Annual renewal'},
        {name:"Tonnage Certificate", responsibility:'Customer', remarks:''},
        {name:"Builder's Certificate", responsibility:'Company', remarks:'Issued upon delivery'},
      ],
      notes:"All MARINA registration, licensing, permit, and certification fees are for the account of the Customer unless otherwise stated. The Company shall provide the Builder's Certificate and other builder-side documents required to support the Customer's registration application."
    };
  }
  if(!q.output) q.output = { showInternalCosts:false };
  if(q.output.showInternalCosts === undefined) q.output.showInternalCosts = false;
  if(!Array.isArray(q.terms)){
    const t = q.terms || {};
    q.terms = [
      {title:'Completion Time', body:t.completion||'12 months from date of receipt of downpayment and Purchase Order'},
      {title:'Payment Terms', body:t.payment||'20% downpayment upon confirmation of order; progress billing per agreed schedule; 10% upon completion and sea trial before delivery'},
      {title:'Hull Warranty', body:t.warranty||'Two (2) years on hull structure for pleasure use, one (1) year for commercial use, covering manufacturing defects under normal use conditions.'},
      {title:'Warranty Exclusions', body:t.exclusions||'Warranty excludes normal wear and tear, misuse or negligence, unauthorized modification, force majeure, and third-party accessories which follow manufacturer warranty.'},
      {title:'Delivery', body:t.delivery||'Delivery outside factory premises subject to separate agreement and additional logistics charges.'},
      {title:'Regulatory Compliance', body:t.compliance||'Boat registration, MARINA licenses, permits and certificates shall be borne by the customer.'},
    ];
  }
}
function persistQuote(q){ q.updatedAt = Date.now(); save(DB_KEYS.quotes, QUOTES); }

const EDITOR_TABS = [
  {id:'client', n:'01', label:'Client & Project'},
  {id:'hull', n:'02', label:'Hull'},

function renderEditor(content, actions){
  let q = getCurrentQuote();
  if(!q){ CURRENT.view='dashboard'; renderAll(); return; }
  ensureQuoteDefaults(q);

  actions.innerHTML = `
    <select id="statusSel" style="padding:7px 10px;border:1px solid #d7d0bc;border-radius:3px;margin-right:8px;">
      ${['draft','sent','approved'].map(s=>`<option value="${s}" ${q.status===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}

  content.innerHTML = `

        <div class="card">

  document.getElementById('statusSel').onchange = (e)=>{ q.status = e.target.value; persistQuote(q); toast('Status updated'); };

  const tabsEl = document.getElementById('editTabs');
  tabsEl.innerHTML = EDITOR_TABS.map(t=>`<div class="tab ${CURRENT.tab===t.id?'active':''}" data-tab="${t.id}"><span class="n">${t.n}</span>${t.label}</div>`).join('');

  const host = document.getElementById('tabHost');
  const renderers = { client:tabClient, hull:tabHull, paint:tabPaint, accessories:tabAccessories, engine:tabEngine, labor:tabLabor, pricing:tabPricing, marina:tabMarina, terms:tabTerms, output:tabOutput };

  if(CURRENT.tab!=='output') updateLiveSummary(q);
}

    `).join('') : `<div class="empty">No clauses yet. Add one to start building your terms &amp; conditions.</div>`;
    wrap.querySelectorAll('.term-f').forEach(el=>{
      el.addEventListener('input', ()=>{
        q.terms[el.dataset.idx][el.dataset.f] = el.value; persistQuote(q);
      });
    });
    wrap.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{
      const i = Number(b.dataset.up); [q.terms[i-1], q.terms[i]] = [q.terms[i], q.terms[i-1]]; persistQuote(q); draw();
    });
    wrap.querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>{
      const i = Number(b.dataset.down); [q.terms[i+1], q.terms[i]] = [q.terms[i], q.terms[i+1]]; persistQuote(q); draw();
    });
    wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
      q.terms.splice(Number(b.dataset.del),1); persistQuote(q); draw();
    });
  }
  document.getElementById('addTerm').onclick = ()=>{
    q.terms.push({title:'New Clause', body:''}); persistQuote(q); draw();
  };
  draw();
}
